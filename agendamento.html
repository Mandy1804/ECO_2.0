<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoDescarte - Agendamento de Coleta</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <h1>EcoDescarte</h1>
    <nav>
        <button class="menu-toggle" aria-expanded="false" aria-controls="main-menu" aria-label="Abrir menu de navegação">☰ Menu</button>
        <ul class="menu" id="main-menu"> 
            <li><a href="index.html">Início</a></li>
            <li><a href="mapa.html">Pontos de Descarte</a></li>
            <li><a href="agendamento.html">Agendamento de Coleta</a></li>
            <li><a href="educacional.html">Educação Ambiental</a></li>
            <li><a href="impacto.html">Impacto Ambiental</a></li>
            </ul>
    </nav>
</header>

    <main>
        <section id="agendamento-form">
            <h2>Agende a Coleta dos seus Resíduos Eletrônicos</h2>
            <form id="form-agendamento">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required><br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>

                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone"><br><br>

                <label for="tipo-residuo">Tipo de Resíduo:</label>
                <textarea id="tipo-residuo" name="tipo-residuo" placeholder="Ex: Computador, celular, televisão..." required></textarea><br><br>

                <label for="endereco">Endereço de Coleta:</label>
                <input type="text" id="endereco" name="endereco" required><br><br>

                <label for="data-coleta">Data da Coleta Desejada:</label>
                <input type="date" id="data-coleta" name="data-coleta" required><br><br>

                <label for="observacoes">Observações Adicionais:</label>
                <textarea id="observacoes" name="observacoes"></textarea><br><br>

                <button type="submit">Solicitar Agendamento</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 EcoDescarte - Todos os direitos reservados.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
